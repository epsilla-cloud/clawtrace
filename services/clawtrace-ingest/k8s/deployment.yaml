apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawtrace-ingest
  labels:
    app: clawtrace-ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clawtrace-ingest
  template:
    metadata:
      labels:
        app: clawtrace-ingest
    spec:
      serviceAccountName: clawtrace-ingest
      containers:
        - name: api
          image: ghcr.io/your-org/clawtrace-ingest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: CLAWTRACE_INGEST_AUTH_MODE
              value: "mock_pass"
            - name: CLAWTRACE_INGEST_STORAGE_PROVIDER
              value: "gcs"
            - name: CLAWTRACE_INGEST_RAW_BUCKET
              value: "clawtrace-raw"
            - name: CLAWTRACE_INGEST_RAW_PREFIX
              value: "raw/v1"
            # Azure profile (set when STORAGE_PROVIDER=azure_blob)
            - name: CLAWTRACE_INGEST_AZURE_CONTAINER
              value: ""
            - name: CLAWTRACE_INGEST_AZURE_ACCOUNT_URL
              value: ""
            - name: CLAWTRACE_INGEST_AZURE_CONNECTION_STRING
              value: ""
            # AWS profile (set when STORAGE_PROVIDER=aws_s3)
            - name: CLAWTRACE_INGEST_AWS_REGION
              value: ""
            - name: CLAWTRACE_INGEST_AWS_ENDPOINT_URL
              value: ""
            - name: CLAWTRACE_INGEST_PUBSUB_TOPIC
              value: "projects/your-project/topics/clawtrace-ingest"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
